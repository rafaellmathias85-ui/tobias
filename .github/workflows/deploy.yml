name: Build and Deploy to CPanel FTP

on:
  push:
    branches:
      - main
      - master
      - production
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs_space
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js application
        run: npm run build
        env:
          # Adicionar aqui variáveis de ambiente necessárias
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Create deployment package
        run: |
          mkdir -p deploy
          # Copiar arquivos necessários
          cp -r .next deploy/
          cp -r public deploy/
          cp package.json deploy/
          cp next.config.js deploy/
          # Copiar node_modules ou usar node_modules do build
          npm install --omit=dev --legacy-peer-deps --prefix deploy
          # Criar arquivo de configuração do servidor
          echo "NODE_ENV=production" > deploy/.env.production
          echo "PORT=3000" >> deploy/.env.production

      - name: Upload to FTP
        uses: milanmk/actions-file-deployer@master
        with:
          remote-url: ${{ secrets.FTP_URL }}
          remote-user: ${{ secrets.FTP_USERNAME }}
          remote-password: ${{ secrets.FTP_PASSWORD }}
          local-path: './nextjs_space/deploy/*'
          args: '--delete'
        continue-on-error: true

  deploy-ftp:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: nextjs_space
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js application
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy via FTP with SCP
        uses: valerio-froidl/ftp-deploy-action@v1
        with:
          host: ${{ secrets.FTP_HOST }}
          user: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: './nextjs_space/.next/'
          remote-dir: ${{ secrets.FTP_REMOTE_DIR }}/.next/
          state-name: '.ftp-deploy-sync-state.json'

      - name: Deploy public files via FTP
        uses: valerio-froidl/ftp-deploy-action@v1
        with:
          host: ${{ secrets.FTP_HOST }}
          user: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: './nextjs_space/public/'
          remote-dir: ${{ secrets.FTP_REMOTE_DIR }}/public/
          state-name: '.ftp-deploy-sync-state-public.json'

      - name: Deploy app files via FTP
        uses: valerio-froidl/ftp-deploy-action@v1
        with:
          host: ${{ secrets.FTP_HOST }}
          user: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: './nextjs_space/'
          remote-dir: ${{ secrets.FTP_REMOTE_DIR }}/
          state-name: '.ftp-deploy-sync-state-app.json'
          exclude: |
            **/.git*
            **/node_modules/
            **/.next/cache
            **/.env*
            **/out/

      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "📍 Host: ${{ secrets.FTP_HOST }}"
          echo "📁 Remote directory: ${{ secrets.FTP_REMOTE_DIR }}"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed!"

  restart-app:
    runs-on: ubuntu-latest
    needs: deploy-ftp
    if: success()
    
    steps:
      - name: SSH into server and restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Navegar até o diretório da aplicação
            cd ${{ secrets.FTP_REMOTE_DIR }}
            
            # Reinstalar dependências de produção
            npm install --omit=dev --legacy-peer-deps
            
            # Reiniciar a aplicação (ajustar conforme seu gerenciador de processo)
            # Opção 1: Se usar PM2
            # pm2 restart app --cwd ${{ secrets.FTP_REMOTE_DIR }}
            
            # Opção 2: Se usar systemd
            # sudo systemctl restart nextjs-app
            
            # Opção 3: Se usar Passenger/Phusion (comum em CPanel)
            touch ${{ secrets.FTP_REMOTE_DIR }}/tmp/restart.txt
        continue-on-error: true
