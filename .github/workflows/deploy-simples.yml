name: Deploy FTP static

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-ftp-static
  cancel-in-progress: true

jobs:
  deploy:
    name: Build static site and upload by FTP
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs_space
    env:
      NEXT_OUTPUT_MODE: export
      NEXTAUTH_URL: https://turmadotobias.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nextjs_space/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Disable API routes for static export
        run: |
          mv app/api ../api-disabled-for-static-export
          mv app/admin ../admin-disabled-for-static-export
          mv app/blog/[slug] ../blog-slug-disabled-for-static-export

      - name: Build static site
        run: npm run build

      - name: Upload static site to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 148.251.86.214
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.HOSTING_FTP_PASSWORD || secrets.HOSTING_SSH_PASSWORD || secrets.FTP_PASSWORD }}
          port: 21
          local-dir: nextjs_space/out/
          server-dir: ${{ vars.FTP_SERVER_DIR || secrets.FTP_REMOTE_DIR || '/public_html/' }}
